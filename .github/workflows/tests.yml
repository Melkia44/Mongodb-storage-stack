name: CI - Tests pipeline Healthcare

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
        options: >-
          --health-cmd="mongosh --quiet -u root -p example --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MONGODB_URI: mongodb://root:example@mongo:27017/MLO_DE_Projet5?authSource=admin
      APP_DB: MLO_DE_Projet5
      COLL_NAME: admissions
      CSV_PATH: MLO_P5_Sources/Data/CSV/healthcare_dataset.csv
      BATCH_SIZE: 1000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLO_P5_Sources/requirements.txt

      - name: Run tests
        working-directory: MLO_P5_Sources
        env:
          PYTHONPATH: ${{ github.workspace }}/MLO_P5_Sources
        run: |
          pytest -v
